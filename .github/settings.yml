# https://github.com/apps/settings
# https://github.com/repository-settings/app

repository:
  name: Docker-NewYearCountdown
  description: >-
    Self hosted, self contained New Year countdown clock. Automatically
    counts down to the next January 1st based on local system time.
  homepage: https://hub.docker.com/r/modem7/newyearcountdown
  topics: docker, new-year, countdown, nginx, self-hosted, homelab, docker-compose
  private: false
  has_issues: true
  has_wiki: false
  has_downloads: true
  has_projects: false
  has_discussions: false
  default_branch: master
  allow_squash_merge: true
  allow_rebase_merge: true
  allow_merge_commit: true
  # Auto-delete head branches after merge
  delete_branch_on_merge: true
  # Always suggest updating PR branches that are behind base
  allow_update_branch: true
  enable_automated_security_fixes: true
  enable_vulnerability_alerts: true

# Labels: define labels for Issues and Pull Requests
labels:
  - name: bug
    color: d73a4a
    description: "Something isn't working"
  - name: dependencies
    color: C62109
    description: "Pull requests that update a dependency file"
  - name: documentation
    color: "0075ca"
    description: "Improvements or additions to documentation"
  - name: duplicate
    color: cfd3d7
    description: "This issue or pull request already exists"
  - name: enhancement
    color: a2eeef
    description: "New feature or request"
  - name: good first issue
    color: "7057ff"
    description: "Good for newcomers"
  - name: help wanted
    color: "008672"
    description: "Extra attention is needed"
  - name: invalid
    color: e4e669
    description: "This doesn't seem right"
  - name: question
    color: d876e3
    description: "Further information is requested"
  - name: wontfix
    color: "ffffff"
    description: "This will not be worked on"
